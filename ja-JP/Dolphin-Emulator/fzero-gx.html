<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS - Dolphin Emulator (F-ZERO GX)</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Dolphin Emulator",
      "operatingSystem": "macOS",
      "applicationCategory": "GameApplication",
      "browserRequirements": "Requires HTML5, CSS3, and JavaScript.",
      "inLanguage": "ja",
      "softwareHelp": {
        "@type": "CreativeWork",
        "name": "F-ZERO GX (エフゼロ ジーエックス)",
        "genre": "Racing Game",
        "publisher": "Nintendo"
      }
    }
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover no-repeat;
        }

        /* macOS Menu Bar */
        .menu-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            z-index: 9999;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .menu-left, .menu-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-item {
            cursor: pointer;
        }
        .menu-item.apple {
            font-size: 15px;
        }
        .menu-item.bold {
            font-weight: 700;
        }

        /* Desktop Area */
        .desktop {
            width: 100%;
            height: 100%;
            padding-top: 24px;
            position: relative;
        }

        /* Desktop Shortcut */
        .desktop-icon {
            position: absolute;
            top: 40px;
            right: 20px;
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            gap: 5px;
        }

        .desktop-icon img {
            width: 55px;
            height: 55px;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.3));
        }

        .desktop-icon span {
            color: white;
            font-size: 12px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.2);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* macOS Window Frame */
        .window {
            position: absolute;
            top: 10%;
            left: 15%;
            width: 70%;
            height: 75%;
            background: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
        }

        .window-titlebar {
            height: 38px;
            background: #2d2d2d;
            display: flex;
            align-items: center;
            padding: 0 12px;
            position: relative;
            border-bottom: 1px solid #1a1a1a;
        }

        .window-buttons {
            display: flex;
            gap: 8px;
            position: absolute;
            left: 12px;
        }

        .win-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
        }
        .btn-close { background: #ff5f56; }
        .btn-minimize { background: #ffbd2e; }
        .btn-maximize { background: #27c93f; }

        .window-title {
            width: 100%;
            text-align: center;
            color: #b3b3b3;
            font-size: 13px;
        }

        /* Dolphin Toolbar */
        .dolphin-toolbar {
            height: 45px;
            background: #3a3a3a;
            border-bottom: 1px solid #252525;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 20px;
            color: #e0e0e0;
            font-size: 12px;
        }

        .toolbar-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            opacity: 0.85;
        }
        .toolbar-btn:hover {
            opacity: 1;
            color: #3897f0;
        }
        .toolbar-btn i {
            font-size: 16px;
            margin-bottom: 2px;
        }

        /* Simulation App Canvas / Content */
        .window-content {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* F-Zero GX Simulated Screen */
        .game-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #050515 0%, #11052Cpx 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* CRT Scanline Overlay Effect */
        .game-screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* UI elements of F-Zero Game Simulation */
        .game-title {
            font-style: italic;
            font-weight: 900;
            font-size: 5vw;
            color: #fff;
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055, 0 0 40px #ff0055;
            letter-spacing: 4px;
            animation: pulse 1.5s infinite alternate;
            text-transform: uppercase;
        }

        .game-subtitle {
            font-size: 1.5vw;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
            margin-top: -10px;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 10px;
        }

        .press-start {
            font-size: 1.2vw;
            color: #fff;
            animation: blink 0.8s infinite;
            cursor: pointer;
            border: 2px solid #fff;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .game-status-bar {
            position: absolute;
            bottom: 15px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 8px;
        }

        /* Dock */
        .dock-container {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 6px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            align-items: flex-end;
            gap: 12px;
            z-index: 9999;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .dock-icon {
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            transform-origin: bottom;
        }
        .dock-icon:hover {
            transform: scale(1.2);
        }
        .dock-icon.active::after {
            content: '';
            display: block;
            width: 4px;
            height: 4px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            margin: 2px auto 0 auto;
        }

        /* Animations */
        @keyframes pulse {
            from { transform: scale(0.98); text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; }
            to { transform: scale(1.02); text-shadow: 0 0 20px #ff00a0, 0 0 40px #ff00a0, 0 0 60px #ff00a0; }
        }
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="menu-bar">
        <div class="menu-left">
            <span class="menu-item apple"></span>
            <span class="menu-item bold">Dolphin</span>
            <span class="menu-item">ファイル</span>
            <span class="menu-item">編集</span>
            <span class="menu-item">エミュレーション</span>
            <span class="menu-item">設定</span>
            <span class="menu-item">グラフィック</span>
            <span class="menu-item">ヘルプ</span>
        </div>
        <div class="menu-right">
            <span class="menu-item">JPN 🇯🇵</span>
            <span id="clock" class="menu-item">13:42</span>
        </div>
    </div>

    <div class="desktop">
        
        <div class="desktop-icon" onclick="toggleWindow()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Dolphin-logo.svg/1280px-Dolphin-logo.svg.png" alt="Dolphin Logo">
            <span>Dolphin</span>
        </div>

        <div class="window" id="dolphinWindow">
            <div class="window-titlebar" id="windowHeader">
                <div class="window-buttons">
                    <div class="win-btn btn-close" onclick="toggleWindow()"></div>
                    <div class="win-btn btn-minimize"></div>
                    <div class="win-btn btn-maximize"></div>
                </div>
                <div class="window-title">Dolphin Emulator – F-ZERO GX (GFZJ01)</div>
            </div>

            <div class="dolphin-toolbar">
                <div class="toolbar-btn" onclick="resetSim()"><span style="font-size:14px;">▶</span><span>再開</span></div>
                <div class="toolbar-btn" onclick="alert('エミュレーションを停止しました')"><span style="font-size:14px;">■</span><span>停止</span></div>
                <div class="toolbar-btn" onclick="resetSim()"><span style="font-size:14px;">↻</span><span>リセット</span></div>
                <div style="border-left: 1px solid #555; height: 25px; margin: 0 5px;"></div>
                <div class="toolbar-btn"><span>🎮</span><span>コントローラ</span></div>
                <div class="toolbar-btn"><span>⚙</span><span>設定</span></div>
            </div>

            <div class="window-content">
                <div class="game-screen">
                    <div class="game-title">F-Zero GX</div>
                    <div class="game-subtitle">エフゼロ ジーエックス</div>
                    <div class="press-start" id="startBtn" onclick="runGame()">PRESS START BUTTON</div>
                    
                    <div class="game-status-bar">
                        <span id="fpsDisplay">FPS: 60.00 (100%)</span>
                        <span>Backend: Metal (Vulkan Core)</span>
                        <span>Locale: ja_JP (NTSC-J)</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <img class="dock-icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Finder_Icon_macOS_Big_Sur.png/512px-Finder_Icon_macOS_Big_Sur.png" alt="Finder">
        <img class="dock-icon active" src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Dolphin-logo.svg/1280px-Dolphin-logo.svg.png" alt="Dolphin" onclick="toggleWindow()">
        <img class="dock-icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/System_Preferences_Icon_macOS_Big_Sur.png/512px-System_Preferences_Icon_macOS_Big_Sur.png" alt="System Preferences">
    </div>

    <script>
        // Simple Real-time Clock Simulator for macOS Environment
        function updateClock() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Toggle visibility of the Dolphin application window
        function toggleWindow() {
            const win = document.getElementById('dolphinWindow');
            if(win.style.display === "none") {
                win.style.display = "flex";
            } else {
                win.style.display = "none";
            }
        }

        // Mock State Interaction for launching Game Scene inside Emulator
        function runGame() {
            const btn = document.getElementById('startBtn');
            btn.textContent = "NOW LOADING...";
            btn.style.animation = "none";
            
            setTimeout(() => {
                btn.textContent = "RACE START (MAIN MENU)";
                alert("F-ZERO GX: エミュレーションが正常に開始されました。\nサーキットを選択してください。");
                btn.textContent = "GAME RUNNING";
                btn.style.color = "#00ffff";
                btn.style.borderColor = "#00ffff";
            }, 1200);
        }

        function resetSim() {
            const btn = document.getElementById('startBtn');
            btn.textContent = "PRESS START BUTTON";
            btn.style.color = "#fff";
            btn.style.borderColor = "#fff";
            btn.style.animation = "blink 0.8s infinite";
            document.getElementById('fpsDisplay').textContent = "FPS: 60.00 (100%)";
        }

        // Jitter the FPS display dynamically to simulate real-world emulation spikes
        setInterval(() => {
            if(document.getElementById('dolphinWindow').style.display !== "none") {
                const randomFps = (59.7 + Math.random() * 0.5).toFixed(2);
                document.getElementById('fpsDisplay').textContent = `FPS: ${randomFps} (100%)`;
            }
        }, 800);

        // Basic Window Dragging Logic
        const dragItem = document.getElementById("windowHeader");
        const container = document.getElementById("dolphinWindow");

        let active = false;
        let currentX, currentY, initialX, initialY;
        let xOffset = 0, yOffset = 0;

        dragItem.addEventListener("mousedown", dragStart, false);
        window.addEventListener("mouseup", dragEnd, false);
        window.addEventListener("mousemove", drag, false);

        function dragStart(e) {
            if (e.target === dragItem || dragItem.contains(e.target)) {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
                active = true;
            }
        }

        function dragEnd(e) {
            initialX = currentX;
            initialY = currentY;
            active = false;
        }

        function drag(e) {
            if (active) {
                e.preventDefault();
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                setTranslate(currentX, currentY, container);
            }
        }

        function setTranslate(xPos, yPos, el) {
            el.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)";
        }
    </script>
</body>
</html>
