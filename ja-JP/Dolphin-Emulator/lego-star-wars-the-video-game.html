<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Simulator - Dolphin Emulator</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "macOS Simulator (Dolphin Emulator - LEGO Star Wars)",
      "operatingSystem": "Web Browser",
      "applicationCategory": "GameApplication",
      "browserRequirements": "Requires HTML5, CSS3, and JavaScript.",
      "inLanguage": "ja",
      "description": "macOS環境をシミュレートし、Dolphinエミュレータ上で『レゴ スター・ウォーズ THE VIDEO GAME』を実行するインタラクティブなアプリケーション。"
    }
    </script>

    <style>
        :root {
            --mac-bg: linear-gradient(135deg, #1f1c2c, #928dab);
            --menu-bg: rgba(255, 255, 255, 0.15);
            --menu-blur: blur(20px);
            --window-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-dim: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--mac-bg);
            overflow: hidden;
            color: var(--text-color);
        }

        /* --- メニューバー (Top Menu Bar) --- */
        #menu-bar {
            width: 100%;
            height: 24px;
            background: var(--menu-bg);
            backdrop-filter: var(--menu-blur);
            -webkit-backdrop-filter: var(--menu-blur);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 9999;
            box-shadow: 0 1px 5px rgba(0,0,0,0.1);
        }

        .menu-left, .menu-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-item {
            cursor: pointer;
            font-weight: 500;
        }
        .menu-item.bold {
            font-weight: 700;
        }

        /* --- デスクトップ (Desktop Area) --- */
        #desktop {
            width: 100%;
            height: 100%;
            padding-top: 24px;
            position: relative;
        }

        .desktop-icon {
            position: absolute;
            top: 40px;
            right: 20px;
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            gap: 5px;
        }

        .desktop-icon img {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.3));
        }

        .desktop-icon span {
            font-size: 12px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* --- ウィンドウ (Dolphin Window) --- */
        #dolphin-window {
            position: absolute;
            top: 10%;
            left: 15%;
            width: 760px;
            height: 500px;
            background: var(--window-bg);
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transform: scale(0);
            transition: transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1);
            z-index: 100;
        }

        #dolphin-window.open {
            transform: scale(1);
        }

        /* ウィンドウヘッダー */
        .window-header {
            height: 35px;
            background: #2d2d2d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            cursor: move;
            border-bottom: 1px solid #1a1a1a;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
        }
        .btn-close { background: #ff5f56; }
        .btn-minimize { background: #ffbd2e; }
        .btn-maximize { background: #27c93f; }

        .window-title {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 400;
        }

        /* エミュレータツールバー */
        .emulator-toolbar {
            height: 40px;
            background: #252526;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 15px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 12px;
        }

        .toolbar-btn {
            padding: 4px 8px;
            background: #333;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #444;
        }
        .toolbar-btn:hover {
            background: #444;
        }

        /* ゲーム画面エリア */
        .game-screen {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* LEGO Star Wars 模擬画面 */
        .star-wars-display {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #020b1e 0%, #000000 100%);
            font-family: 'Impact', 'Arial Black', sans-serif;
            text-align: center;
            position: relative;
        }

        .lego-logo {
            background: #ff0000;
            color: #fff;
            padding: 5px 15px;
            font-size: 24px;
            font-weight: bold;
            border: 4px solid #fecb00;
            box-shadow: 0 0 10px rgba(254,203,0,0.6);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .sw-title {
            font-size: 38px;
            color: #fecb00;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(254,203,0,0.8);
            margin-bottom: 5px;
        }

        .sw-subtitle {
            font-size: 16px;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .press-start {
            font-size: 18px;
            color: #00ffcc;
            animation: blink 1.2s infinite;
            font-family: sans-serif;
            font-weight: bold;
        }

        .fps-counter {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-family: monospace;
            font-size: 12px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* --- ドック (Dock) --- */
        #dock-container {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 9999;
        }

        .dock {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: var(--menu-blur);
            -webkit-backdrop-filter: var(--menu-blur);
            padding: 8px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
            align-items: end;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .dock-item {
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: transform 0.2s ease;
            position: relative;
        }

        .dock-item:hover {
            transform: scale(1.2) translateY(-10px);
        }

        .dock-item img {
            width: 100%;
            height: 100%;
        }

        .dock-item::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            display: none;
        }

        .dock-item.active::after {
            display: block;
        }
    </style>
</head>
<body>

    <div id="menu-bar">
        <div class="menu-left">
            <span class="menu-item bold"></span>
            <span class="menu-item bold" id="active-app">Dolphin</span>
            <span class="menu-item">ファイル</span>
            <span class="menu-item">編集</span>
            <span class="menu-item">表示</span>
            <span class="menu-item">エミュレーション</span>
            <span class="menu-item">ウィンドウ</span>
            <span class="menu-item">ヘルプ</span>
        </div>
        <div class="menu-right">
            <span class="menu-item">JPN</span>
            <span class="menu-item" id="battery-status">100% 🔋</span>
            <span class="menu-item" id="live-clock">00:00</span>
        </div>
    </div>

    <div id="desktop">
        <div class="desktop-icon" onclick="openDolphin()">
            <img src="https://cdn2.steamgriddb.com/icon/8146f98d564daf7f6cc87d9edcb92705/32/256x256.png" alt="Dolphin Icon">
            <span>Dolphin</span>
        </div>

        <div id="dolphin-window">
            <div class="window-header" id="windowHeader">
                <div class="window-controls">
                    <div class="control-btn btn-close" onclick="closeDolphin()"></div>
                    <div class="control-btn btn-minimize" onclick="closeDolphin()"></div>
                    <div class="control-btn btn-maximize"></div>
                </div>
                <div class="window-title">Dolphin | レゴ スター・ウォーズ THE VIDEO GAME (JAPAN)</div>
                <div style="width: 40px;"></div> </div>
            
            <div class="emulator-toolbar">
                <div class="toolbar-btn" onclick="resetEmulation()">🔄 再起動</div>
                <div class="toolbar-btn">⏸ 一時停止</div>
                <div class="toolbar-btn" onclick="toggleFPS()">📈 FPS表示切替</div>
                <div style="color: #888; font-size: 11px; margin-left: auto;">Backend: OpenGL (Jpn-ISO)</div>
            </div>

            <div class="game-screen">
                <div class="fps-counter" id="fps-display">FPS: 60.0 (100%)</div>
                
                <div class="star-wars-display">
                    <div class="lego-logo">LEGO</div>
                    <div class="sw-title">STAR WARS</div>
                    <div class="sw-subtitle">THE VIDEO GAME</div>
                    <div class="press-start">スタートボタンを押してください</div>
                </div>
            </div>
        </div>
    </div>

    <div id="dock-container">
        <div class="dock">
            <div class="dock-item active" onclick="openDolphin()" id="dock-dolphin">
                <img src="https://cdn2.steamgriddb.com/icon/8146f98d564daf7f6cc87d9edcb92705/32/256x256.png" alt="Dolphin">
            </div>
        </div>
    </div>

    <script>
        // 時計の実装
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('live-clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ウィンドウ制御
        const dolphinWindow = document.getElementById('dolphin-window');
        const dockDolphin = document.getElementById('dock-dolphin');

        function openDolphin() {
            dolphinWindow.classList.add('open');
            dockDolphin.classList.add('active');
            document.getElementById('active-app').textContent = "Dolphin";
        }

        function closeDolphin() {
            dolphinWindow.classList.remove('open');
            dockDolphin.classList.remove('active');
            document.getElementById('active-app').textContent = "Finder";
        }

        // FPSの表示切り替え
        const fpsDisplay = document.getElementById('fps-display');
        function toggleFPS() {
            if (fpsDisplay.style.display === 'none') {
                fpsDisplay.style.display = 'block';
            } else {
                fpsDisplay.style.display = 'none';
            }
        }

        // エミュレータ擬似再起動
        function resetEmulation() {
            const startText = document.querySelector('.press-start');
            startText.textContent = "読み込み中...";
            setTimeout(() => {
                startText.textContent = "スタートボタンを押してください";
            }, 1500);
        }

        // ドラッグ移動機能の実装
        let isDragging = false;
        let offsetX, offsetY;

        const header = document.getElementById('windowHeader');

        header.addEventListener('mousedown', (e) => {
            isDragging = true;
            offsetX = e.clientX - dolphinWindow.offsetLeft;
            offsetY = e.clientY - dolphinWindow.offsetTop;
            dolphinWindow.style.transition = 'none'; // ドラッグ中はアニメーションを無効化
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            dolphinWindow.style.left = `${e.clientX - offsetX}px`;
            dolphinWindow.style.top = `${e.clientY - offsetY}px`;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            dolphinWindow.style.transition = 'transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1)';
        });

        // 初期状態でウィンドウを開く
        window.onload = () => {
            setTimeout(openDolphin, 500);
        };
    </script>
</body>
</html>
