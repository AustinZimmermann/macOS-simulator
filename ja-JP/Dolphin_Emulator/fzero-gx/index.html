<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS - Dolphin Emulator (F-ZERO GX)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-bar" id="menuBar">
        <div class="menu-left">
            <span class="menu-item bold" id="apple-logo"></span>
            <span class="menu-item bold" id="menu-app">Dolphin</span>
            <span class="menu-item" id="menu-file">ファイル</span>
            <span class="menu-item" id="menu-edit">編集</span>
            <span class="menu-item" id="menu-emu">エミュレーション</span>
            <span class="menu-item" id="menu-view">表示</span>
        </div>
        <div class="menu-right">
            <span class="menu-item">JPN</span>
            <span class="menu-item" id="clock">00:00</span>
        </div>
    </div>

    <div class="desktop">
        
        <div class="window" id="dolphinWindow">
            <div class="window-header">
                <div class="window-controls">
                    <button class="control close" id="closeBtn" title="Close"></button>
                    <button class="control minimize" id="minBtn" title="Minimize"></button>
                    <button class="control maximize" id="maxBtn" title="Maximize"></button>
                </div>
                <div class="window-title" id="windowTitle">Dolphin - F-ZERO GX (JPN)</div>
            </div>
            
            <div class="window-content">
                <div class="game-container">
                    <div class="game-screen">
                        <div class="fzero-logo">F-ZERO GX</div>
                        <div class="press-start" id="pressStart">PRESS START BUTTON</div>
                        <div class="game-footer" id="gameFooter">©2003 Nintendo / SEGA</div>
                    </div>
                </div>
            </div>
            
            <div class="window-status" id="windowStatus">
                FPS: 60 - VPS: 60 (100%)
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
