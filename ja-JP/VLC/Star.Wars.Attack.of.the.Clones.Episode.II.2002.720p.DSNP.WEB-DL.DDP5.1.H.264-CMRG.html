<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Simulator - VLC Player</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 16:9 Letterbox Container */
        #screen-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            max-height: 100vh;
            max-width: 177.78vh; /* 16:9 Aspect Ratio */
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1920') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Menu Bar */
        #menu-bar {
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            z-index: 9999;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-left, .menu-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .apple-icon {
            font-size: 15px;
            font-weight: bold;
        }

        .menu-item.active {
            font-weight: 700;
        }

        /* Desktop App Icons */
        .desktop-icon {
            position: absolute;
            top: 40px;
            right: 20px;
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-align: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .desktop-icon img {
            width: 55px;
            height: 55px;
            object-fit: contain;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.3));
        }

        .desktop-icon span {
            color: white;
            font-size: 11px;
            margin-top: 5px;
            word-break: break-all;
            line-height: 1.2;
            background: rgba(0,0,0,0.2);
            padding: 2px 4px;
            border-radius: 4px;
        }

        /* VLC Window */
        #vlc-window {
            position: absolute;
            top: 10%;
            left: 15%;
            width: 70%;
            height: 75%;
            background: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
        }

        /* Window Controls */
        .window-header {
            height: 35px;
            background: #2d2d2d;
            display: flex;
            align-items: center;
            padding: 0 12px;
            position: relative;
            border-bottom: 1px solid #121212;
            cursor: move;
        }

        .window-buttons {
            display: flex;
            gap: 8px;
            position: absolute;
            left: 12px;
        }

        .win-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .btn-close { background: #ff5f56; }
        .btn-minimize { background: #ffbd2e; }
        .btn-maximize { background: #27c93f; }

        .window-title {
            width: 100%;
            text-align: center;
            color: #b3b3b3;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 80px;
        }

        /* VLC Video Player Area */
        .vlc-content {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Star Wars Fake Video Graphics */
        .video-canvas {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #000 15%, #050b14 50%, #000 85%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffe81f; /* Star Wars Yellow */
            font-family: "Franklin Gothic Medium", sans-serif;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .star-wars-title {
            font-size: 2vw;
            text-transform: uppercase;
            letter-spacing: 4px;
            transform: perspective(300px) rotateX(25deg);
            animation: scrollText 20s linear infinite;
        }

        .subtitle-area {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 14px;
            text-shadow: 1px 1px 3px #000;
        }

        @keyframes scrollText {
            0% { transform: perspective(200px) rotateX(20deg) translateY(150px) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: perspective(200px) rotateX(20deg) translateY(-150px) scale(0.6); opacity: 0; }
        }

        /* VLC Control Bar */
        .vlc-controls {
            height: 45px;
            background: #222;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
        }

        .play-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }

        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
            font-size: 11px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: #444;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            width: 38%;
            height: 100%;
            background: #ff8800; /* VLC Orange */
            border-radius: 3px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #aaa;
            font-size: 14px;
        }

        .volume-slider {
            width: 60px;
            height: 4px;
            background: #ff8800;
            border-radius: 2px;
        }

        /* Dock */
        #dock-container {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            gap: 12px;
            align-items: end;
            z-index: 9999;
        }

        .dock-item {
            width: 50px;
            height: 50px;
            transition: all 0.2s ease;
            cursor: pointer;
            transform-origin: bottom;
        }

        .dock-item:hover {
            transform: scale(1.2);
            margin: 0 8px;
        }

        .dock-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .dock-indicator {
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            margin: 2px auto 0 auto;
        }
    </style>
</head>
<body>

    <div id="screen-container">
        
        <div id="menu-bar">
            <div class="menu-left">
                <span class="apple-icon"></span>
                <span class="menu-item active">VLC</span>
                <span class="menu-item">ファイル</span>
                <span class="menu-item">編集</span>
                <span class="menu-item">表示</span>
                <span class="menu-item">再生</span>
                <span class="menu-item">オーディオ</span>
                <span class="menu-item">ビデオ</span>
                <span class="menu-item">ウィンドウ</span>
                <span class="menu-item">ヘルプ</span>
            </div>
            <div class="menu-right">
                <span id="menu-audio">🔊</span>
                <span id="menu-battery">100% 🔋</span>
                <span id="menu-date">7月8日(水) 20:39</span>
            </div>
        </div>

        <div class="desktop-icon" onclick="openVLC()">
            <img src="https://images.sftcdn.net/images/t_app-icon-s/p/c6a42060-96d1-11e6-9022-00163ec9f5fa/1846273779/vlc-media-player-145px-VLC_Icon.svg.png" alt="VLC Icon">
            <span>VLC</span>
        </div>

        <div id="vlc-window">
            <div class="window-header" id="window-drag">
                <div class="window-buttons">
                    <button class="win-btn btn-close" onclick="closeVLC()"></button>
                    <button class="win-btn btn-minimize"></button>
                    <button class="win-btn btn-maximize"></button>
                </div>
                <div class="window-title">Star.Wars.Attack.of.the.Clones.Episode.II.2002.720p.DSNP.WEB-DL.DDP5.1.H.264-CMRG.mkv</div>
            </div>
            
            <div class="vlc-content">
                <div class="video-canvas">
                    <div class="star-wars-title">
                        STAR WARS<br>
                        <span style="font-size: 1.2vw; color: #fff;">エピソード2<br>クローンの攻撃</span>
                    </div>
                    <div class="subtitle-area">カミーノのクローン製造施設へようこそ。</div>
                </div>
            </div>

            <div class="vlc-controls">
                <button class="play-btn">⏸</button>
                <div class="progress-container">
                    <span>54:12</span>
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                    <span>2:22:00</span>
                </div>
                <div class="volume-container">
                    <span>🔊</span>
                    <div class="volume-slider"></div>
                </div>
            </div>
        </div>

        <div id="dock-container">
            <div class="dock-wrapper" onclick="openVLC()">
                <div class="dock-item">
                    <img src="https://images.sftcdn.net/images/t_app-icon-s/p/c6a42060-96d1-11e6-9022-00163ec9f5fa/1846273779/vlc-media-player-145px-VLC_Icon.svg.png" alt="VLC Dock Icon">
                    <div class="dock-indicator"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const vlcWindow = document.getElementById('vlc-window');
        const dragHeader = document.getElementById('window-drag');
        const playBtn = document.querySelector('.play-btn');
        let isPlaying = true;

        // Window toggle functions
        function closeVLC() {
            vlcWindow.style.display = 'none';
        }

        function openVLC() {
            vlcWindow.style.display = 'flex';
        }

        // Toggle Play/Pause UI state
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                playBtn.innerText = '▶';
                document.querySelector('.star-wars-title').style.animationPlayState = 'paused';
            } else {
                playBtn.innerText = '⏸';
                document.querySelector('.star-wars-title').style.animationPlayState = 'running';
            }
            isPlaying = !isPlaying;
        });

        // Simple Window Drag Logic
        let isDragging = false;
        let startX, startY, initialX, initialY;

        dragHeader.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            initialX = vlcWindow.offsetLeft;
            initialY = vlcWindow.offsetTop;
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);
        });

        function drag(e) {
            if (!isDragging) return;
            let dx = e.clientX - startX;
            let dy = e.clientY - startY;
            vlcWindow.style.left = (initialX + dx) + 'px';
            vlcWindow.style.top = (initialY + dy) + 'px';
        }

        function stopDrag() {
            isDragging = false;
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('mouseup', stopDrag);
        }
    </script>
</body>
</html>
