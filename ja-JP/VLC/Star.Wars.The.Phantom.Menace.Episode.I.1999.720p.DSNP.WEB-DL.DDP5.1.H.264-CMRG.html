<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Simulator - Star Wars Episode I</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
        }

        /* Menu Bar */
        #menu-bar {
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 13px;
            color: #ffffff;
            font-weight: 500;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            box-shadow: 0 1px 0 rgba(0,0,0,0.15);
        }

        .menu-left, .menu-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .apple-icon {
            font-size: 16px;
            cursor: pointer;
        }

        .menu-item {
            cursor: pointer;
        }

        /* Desktop Area */
        #desktop {
            width: 100%;
            height: calc(100% - 24px);
            position: absolute;
            top: 24px;
            left: 0;
            padding: 20px;
        }

        /* Desktop Shortcut */
        .shortcut {
            width: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            gap: 5px;
        }

        .shortcut img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.3));
        }

        .shortcut span {
            color: white;
            font-size: 12px;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            padding: 2px 4px;
            border-radius: 3px;
        }

        /* macOS Window Container */
        .window {
            position: absolute;
            top: 10%;
            left: 15%;
            width: 760px;
            height: 510px;
            background: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
        }

        /* Window Header */
        .window-header {
            height: 38px;
            background: #2d2d2d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            cursor: move;
            border-bottom: 1px solid #111;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
        }

        .close-btn { background: #ff5f56; }
        .minimize-btn { background: #ffbd2e; }
        .maximize-btn { background: #27c93f; }

        .window-title {
            color: #b3b3b3;
            font-size: 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }

        /* VLC Player Specific UI */
        .vlc-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        /* Video Workspace with 16:9 Letterbox Container */
        .video-container {
            flex: 1;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Explicit 16:9 Box simulating the movie frame */
        .movie-canvas {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #050505;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Visual Star Wars Simulation Cinematic Elements */
        .starwars-intro {
            text-align: center;
            color: #4bd5ee;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            animation: fadeOut 6s forwards;
            position: absolute;
        }

        .starwars-logo {
            width: 70%;
            opacity: 0;
            transform: scale(1.5);
            animation: logoZoom 12s cubic-bezier(0.12, 0, 0.39, 0) 5s forwards;
            position: absolute;
        }

        @keyframes fadeOut {
            0% { opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }

        @keyframes logoZoom {
            0% { opacity: 0; transform: scale(1.4); }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { opacity: 0; transform: scale(0.05); }
        }

        /* VLC Control Panel */
        .vlc-controls {
            height: 44px;
            background: #222;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
        }

        .play-btn {
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            width: 20px;
        }

        .progress-container {
            flex: 1;
            height: 6px;
            background: #444;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }

        .progress-bar {
            width: 8%;
            height: 100%;
            background: #ff9500; /* VLC orange accent */
            border-radius: 3px;
        }

        .time-display {
            color: #aaa;
            font-size: 11px;
            min-width: 75px;
            text-align: right;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #aaa;
            font-size: 14px;
        }

        .volume-slider {
            width: 60px;
            height: 4px;
            background: #ff9500;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="menu-bar">
        <div class="menu-left">
            <span class="apple-icon"></span>
            <span class="menu-item" style="font-weight: 700;">VLC</span>
            <span class="menu-item">ファイル</span>
            <span class="menu-item">編集</span>
            <span class="menu-item">表示</span>
            <span class="menu-item">再生</span>
            <span class="menu-item">オーディオ</span>
            <span class="menu-item">ビデオ</span>
            <span class="menu-item">ウィンドウ</span>
            <span class="menu-item">ヘルプ</span>
        </div>
        <div class="menu-right">
            <span class="menu-item">A</span>
            <span class="menu-item">🔋 100%</span>
            <span class="menu-item" id="menu-clock">7月8日(水) 20:25</span>
        </div>
    </div>

    <div id="desktop">
        <div class="shortcut" id="file-shortcut">
            <img src="https://images.sftcdn.net/images/t_app-icon-s/p/c6a42060-96d1-11e6-9022-00163ec9f5fa/1846273779/vlc-media-player-145px-VLC_Icon.svg.png" alt="VLC Icon">
            <span>VLC</span>
        </div>

        <div class="window" id="vlc-window">
            <div class="window-header" id="window-header">
                <div class="window-controls">
                    <div class="control-btn close-btn" id="close-win"></div>
                    <div class="control-btn minimize-btn"></div>
                    <div class="control-btn maximize-btn"></div>
                </div>
                <div class="window-title">Star.Wars.The.Phantom.Menace.Episode.I.1999.720p.DSNP.WEB-DL.DDP5.1.H.264-CMRG.mkv</div>
            </div>
            
            <div class="vlc-content">
                <div class="video-container">
                    <div class="movie-canvas">
                        <div class="starwars-intro">遠い昔、はるかかなたの銀河系で…</div>
                        <img class="starwars-logo" src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Star_Wars_Logo.svg" alt="Star Wars Logo">
                    </div>
                </div>

                <div class="vlc-controls">
                    <div class="play-btn" id="play-trigger">║</div>
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                    <div class="time-display">00:04:12 / 02:16:11</div>
                    <div class="volume-container">
                        <span>🔊</span>
                        <div class="volume-slider"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Real-time macOS Clock Setup (Japanese Format)
        function updateClock() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const day = days[now.getDay()];
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('menu-clock').textContent = `${month}月${date}日(${day}) ${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Drag and Drop Logic for macOS Window Window
        const win = document.getElementById('vlc-window');
        const header = document.getElementById('window-header');
        let isDragging = false;
        let offsetX, offsetY;

        header.addEventListener('mousedown', (e) => {
            isDragging = true;
            offsetX = e.clientX - win.getBoundingClientRect().left;
            offsetY = e.clientY - win.getBoundingClientRect().top;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            win.style.left = `${e.clientX - offsetX}px`;
            win.style.top = `${e.clientY - offsetY}px`;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // App Control Simulator Logic (Close & Reopen from Shortcut)
        const closeBtn = document.getElementById('close-win');
        const shortcut = document.getElementById('file-shortcut');
        const playTrigger = document.getElementById('play-trigger');

        closeBtn.addEventListener('click', () => {
            win.style.display = 'none';
        });

        shortcut.addEventListener('dblclick', () => {
            win.style.display = 'flex';
        });
        
        // Mobile fallback for double click
        shortcut.addEventListener('click', () => {
            win.style.display = 'flex';
        });

        // Basic play/pause toggle interface indicator
        let isPlaying = true;
        playTrigger.addEventListener('click', () => {
            if(isPlaying) {
                playTrigger.textContent = '▶';
                isPlaying = false;
            } else {
                playTrigger.textContent = '║';
                isPlaying = true;
            }
        });
    </script>
</body>
</html>
