<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS - VLC Media Player</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, sans-serif;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* --- Menu Bar --- */
        .menu-bar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 24px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            font-size: 13px;
            color: #ffffff;
            font-weight: 500;
            box-shadow: 0 1px 0px rgba(0,0,0,0.15);
            z-index: 9999;
        }

        .menu-left, .menu-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .menu-item {
            cursor: default;
        }

        .menu-item.apple-logo {
            font-size: 15px;
        }

        .menu-item.active {
            font-weight: 700;
        }

        /* --- VLC Window --- */
        .window {
            position: absolute;
            top: 10%;
            left: 15%;
            width: 800px;
            background: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
        }

        /* Window Header */
        .window-header {
            background: #2d2d2d;
            height: 28px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            position: relative;
            border-bottom: 1px solid #1a1a1a;
        }

        .window-buttons {
            display: flex;
            gap: 8px;
            position: absolute;
            left: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot-close { background: #ff5f56; }
        .dot-minimize { background: #ffbd2e; }
        .dot-maximize { background: #27c93f; }

        .window-title {
            width: 100%;
            text-align: center;
            color: #b3b3b3;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 80px;
        }

        /* Player Screen (16:9 Letterbox Container) */
        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Simulated Movie Canvas */
        .movie-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #050505;
            color: #ffe81f; /* Star Wars Yellow */
            font-family: "Times New Roman", Times, serif;
            text-align: center;
            position: relative;
        }

        .star-wars-title {
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 232, 31, 0.5);
        }

        .star-wars-subtitle {
            font-size: 16px;
            color: #ffffff;
            font-family: "Hiragino Mincho ProN", serif;
        }

        /* VLC Controller Bar */
        .vlc-controls {
            background: #212121;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
            border-top: 1px solid #1a1a1a;
        }

        .control-btn {
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 4px;
        }
        .control-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .progress-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #a0a0a0;
            font-size: 11px;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #404040;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            width: 35%;
            height: 100%;
            background: #ff8800; /* VLC Orange */
            border-radius: 2px;
        }

        /* --- Dock --- */
        .dock-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 5px;
            z-index: 9999;
        }

        .dock {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 10px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .dock-item {
            width: 50px;
            height: 50px;
            transition: transform 0.2s;
            cursor: pointer;
            position: relative;
        }

        .dock-item:hover {
            transform: scale(1.2);
            margin: 0 10px;
        }

        .dock-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Active App Indicator Dot */
        .dock-item.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="menu-bar">
        <div class="menu-left">
            <div class="menu-item apple-logo"></div>
            <div class="menu-item active">VLC</div>
            <div class="menu-item">ファイル</div>
            <div class="menu-item">編集</div>
            <div class="menu-item">表示</div>
            <div class="menu-item">再生</div>
            <div class="menu-item">オーディオ</div>
            <div class="menu-item">ビデオ</div>
            <div class="menu-item">ウィンドウ</div>
            <div class="menu-item">ヘルプ</div>
        </div>
        <div class="menu-right">
            <div class="menu-item">A</div>
            <div class="menu-item">JPN</div>
            <div class="menu-item" id="current-time">12:00</div>
        </div>
    </div>

    <div class="window" id="vlc-window">
        <div class="window-header">
            <div class="window-buttons">
                <div class="dot dot-close" onclick="toggleVLC()"></div>
                <div class="dot dot-minimize"></div>
                <div class="dot dot-maximize"></div>
            </div>
            <div class="window-title">Star.Wars.Revenge.of.the.Sith.Episode.III.2005.720p.DSNP.WEB-DL.DDP5.1.H.264-CMRG.mkv</div>
        </div>
        
        <div class="video-container">
            <div class="movie-screen">
                <div class="star-wars-title">Star Wars</div>
                <div class="star-wars-subtitle">エピソード3／シスの復讐</div>
            </div>
        </div>

        <div class="vlc-controls">
            <button class="control-btn" id="play-btn">⏸</button>
            <button class="control-btn">⏮</button>
            <button class="control-btn">⏭</button>
            <div class="progress-container">
                <span>0:42:18</span>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <span>2:20:00</span>
            </div>
            <button class="control-btn">🔊</button>
            <button class="control-btn">⤢</button>
        </div>
    </div>

    <div class="dock-container">
        <div class="dock">
            <div class="dock-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c9/Finder_Icon_macOS_Big_Sur.png" alt="Finder">
            </div>
            <div class="dock-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/52/Safari_browser_logo.svg" alt="Safari">
            </div>
            <div class="dock-item active" onclick="toggleVLC()">
                <img src="https://images.sftcdn.net/images/t_app-icon-s/p/c6a42060-96d1-11e6-9022-00163ec9f5fa/1846273779/vlc-media-player-145px-VLC_Icon.svg.png" alt="VLC">
            </div>
            <div class="dock-item">
                <img src="https://upload.wikimedia.org/wikipedia/icons/cloudfront/gnome-colors-common/trash-can.svg" alt="Trash">
            </div>
        </div>
    </div>

    <script>
        // Simple window toggle Simulation
        const vlcWindow = document.getElementById('vlc-window');
        function toggleVLC() {
            if (vlcWindow.style.display === 'none') {
                vlcWindow.style.display = 'flex';
            } else {
                vlcWindow.style.display = 'none';
            }
        }

        // Simple Play/Pause toggle
        const playBtn = document.getElementById('play-btn');
        playBtn.addEventListener('click', () => {
            if (playBtn.innerText === '⏸') {
                playBtn.innerText = '▶';
            } else {
                playBtn.innerText = '⏸';
            }
        });

        // Sync system tray clock to real time
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('current-time').innerText = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
