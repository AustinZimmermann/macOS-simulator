<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLC メディアプレイヤー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="vlc-container">
        <div class="window-header">
            <div class="window-controls">
                <span class="control close"></span>
                <span class="control minimize"></span>
                <span class="control maximize"></span>
            </div>
            <div class="window-title" id="window-title">VLC メディアプレイヤー</div>
        </div>

        <div class="main-content">
            <div class="player-display" id="player-display">
                <img src="https://img.icons8.com/?size=512&id=13445&format=png" alt="VLC Cone" class="vlc-logo" id="vlc-logo">
                <div class="track-info" id="track-info" style="display: none;">
                    <h2 id="current-title">タイトル</h2>
                    <p id="current-artist">アーティスト</p>
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-header">プレイリスト</div>
                <ul class="playlist" id="playlist-tracks">
                    </ul>
            </div>
        </div>

        <div class="controller-bar">
            <div class="progress-container">
                <span class="time-display" id="time-current">0:00</span>
                <input type="range" class="progress-bar" id="progress-bar" min="0" max="100" value="0">
                <span class="time-display" id="time-total">0:00</span>
            </div>

            <div class="controls-group">
                <div class="playback-buttons">
                    <button id="btn-prev" title="前へ">⏮</button>
                    <button id="btn-play" title="再生">▶</button>
                    <button id="btn-stop" title="停止">■</button>
                    <button id="btn-next" title="次へ">⏭</button>
                </div>

                <div class="volume-container">
                    <span class="volume-icon">🔊</span>
                    <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
