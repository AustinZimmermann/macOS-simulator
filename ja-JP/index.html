<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="menu-bar">
        <div class="left-menu">
            <span class="apple-icon"></span>
            <span class="bold">Finder</span>
            <span>ファイル</span>
            <span>編集</span>
            <span>表示</span>
            <span>移動</span>
            <span>ウィンドウ</span>
            <span>ヘルプ</span>
        </div>
        <div class="right-menu">
            <span id="battery">🔋 100%</span>
            <span id="wifi">📶</span>
            <span id="clock">00:00</span>
        </div>
    </header>

    <main class="desktop">
        <div class="window" id="finder-window">
            <div class="window-header">
                <div class="window-controls">
                    <span class="control close" id="close-btn"></span>
                    <span class="control minimize"></span>
                    <span class="control maximize"></span>
                </div>
                <div class="window-title">Finder</div>
            </div>
            <div class="window-body">
                <aside class="sidebar">
                    <h3>よく使う項目</h3>
                    <ul>
                        <li class="active" id="nav-recents">最近の項目</li>
                        <li id="nav-documents">書類</li>
                        <li id="nav-downloads">ダウンロード</li>
                    </ul>
                </aside>
                <section class="content" id="finder-content">
                    </section>
            </div>
        </div>
    </main>

    <nav class="dock-container">
        <div class="dock">
            <div class="dock-item" id="dock-finder" title="Finder">
                <img src="https://img.icons8.com/color/96/mac-os.png" alt="Finder">
                <div class="dot"></div>
            </div>
            <div class="dock-item" title="Safari">
                <img src="https://img.icons8.com/color/96/safari.png" alt="Safari">
            </div>
            <div class="dock-item" title=" there is no App Store ">
                <img src="https://img.icons8.com/color/96/apple-app-store.png" alt="App Store">
            </div>
            <div class="dock-item" title="システム設定">
                <img src="https://img.icons8.com/color/96/mac-os-preferences.png" alt="Settings">
            </div>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
