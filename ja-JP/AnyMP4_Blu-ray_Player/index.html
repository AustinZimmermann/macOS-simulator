<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Simulator - AnyMP4 Blu-ray Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="menu-bar">
        <div class="menu-left">
            <span class="menu-item bold" id="menu-apple"></span>
            <span class="menu-item bold" id="menu-app-name">AnyMP4 Blu-ray Player</span>
            <span class="menu-item" id="menu-file">ファイル</span>
            <span class="menu-item" id="menu-control">コントロール</span>
            <span class="menu-item" id="menu-audio">音声</span>
            <span class="menu-item" id="menu-video">ビデオ</span>
        </div>
        <div class="menu-right">
            <span id="current-time">00:00</span>
        </div>
    </header>

    <main class="desktop">
        
        <div class="window" id="player-window">
            <div class="window-header">
                <div class="window-buttons">
                    <span class="btn close"></span>
                    <span class="btn minimize"></span>
                    <span class="btn maximize"></span>
                </div>
                <div class="window-title" id="window-title">AnyMP4 ブルーレイ プレーヤー</div>
            </div>
            
            <div class="window-content">
                <div class="video-screen" id="drop-zone">
                    <div class="screen-overlay" id="screen-status">
                        <div class="logo">AnyMP4</div>
                        <p id="media-status">メディアが読み込まれていません</p>
                    </div>
                    <video id="video-element" src=""></video>
                </div>

                <div class="action-buttons" id="main-actions">
                    <button class="action-btn" id="btn-open-file">
                        <span class="icon">📁</span>
                        <span id="txt-open-file">ファイルを開く</span>
                    </button>
                    <button class="action-btn" id="btn-open-disc">
                        <span class="icon">💿</span>
                        <span id="txt-open-disc">ディスクを開く</span>
                    </button>
                </div>

                <input type="file" id="file-input" accept="video/*" style="display: none;">

                <div class="timeline-container">
                    <input type="range" id="progress-bar" min="0" max="100" value="0">
                </div>

                <div class="control-bar">
                    <button class="ctrl-btn" id="ctrl-rw" title="巻き戻し">⏮</button>
                    <button class="ctrl-btn main-play" id="ctrl-play" title="再生">▶</button>
                    <button class="ctrl-btn" id="ctrl-stop" title="停止">■</button>
                    <button class="ctrl-btn" id="ctrl-ff" title="早送り">⏭</button>
                    <div class="volume-container">
                        <span>🔊</span>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.8">
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div class="dock-container">
        <div class="dock">
            <div class="dock-item active" title="AnyMP4 Blu-ray Player">
                <div class="app-icon">💿</div>
                <div class="indicator"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
